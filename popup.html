<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MM Serp Crawler</title>
    <link rel="stylesheet" href="popup.css" />
</head>

<body>
    <div class="container">

        <header>
            <div class="header-inner">
                <span class="logo">⚡</span>
                <h1>MM Serp Crawler</h1>
            </div>
        </header>

        <section class="section-add">
            <div class="input-row">
                <input type="text" id="domainInput" placeholder="Masukkan domain, misal: codef.id" autocomplete="off" />
                <button id="addBtn" class="btn btn-primary">Add</button>
            </div>
        </section>

        <section class="section-settings">
            <label class="hl-toggle" for="highlightCheckbox">
                <input type="checkbox" id="highlightCheckbox" />
                <span class="hl-slider"></span>
                <span class="hl-label-text">Highlight matched domain di halaman ini</span>
            </label>
        </section>

        <section class="section-list">
            <div class="list-header">
                <span class="list-title">Daftar Domain</span>
                <button id="clearAllBtn" class="btn btn-danger btn-sm" disabled>Hapus Semua</button>
            </div>
            <div id="emptyState" class="empty-state">Belum ada domain ditambahkan.</div>
            <table id="domainTable" style="display:none">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Domain</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="domainTableBody"></tbody>
            </table>
        </section>

        <section class="section-grab">
            <button id="grabBtn" class="btn btn-success btn-full">▶ Grab URLs dari Halaman</button>
            <div id="status" class="status" style="display:none"></div>
            <div id="resultBox" class="result-box" style="display:none">
                <div class="result-header">
                    <span id="resultCount" class="result-count"></span>
                    <button id="copyBtn" class="btn btn-sm btn-outline">⎘ Copy Ulang</button>
                </div>
                <textarea id="resultText" readonly spellcheck="false"></textarea>
            </div>
        </section>

    </div>
    <script src="popup.js"></script>
</body>

</html>
